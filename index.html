  .country-header-num {
    font-family: 'Fraunces', serif;
    font-size: 0.9rem; font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.15em;
  }
  .country-header h3 {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.8rem, 3.5vw, 2.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-top: 0.2rem;
  }
  .country-header-en {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem; color: var(--accent);
    opacity: 0.8;
  }
  .country-cities-count {
    background: var(--ink); color: var(--bg);
    padding: 0.4rem 1rem;
    border-radius: 999px;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* 都市カード（詳細） */
  .detail-item {
    scroll-margin-top: 6rem;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 3rem; align-items: center;
    margin-bottom: 3rem; padding: 2rem;
    border-radius: 2rem; background: var(--bg);
    position: relative; overflow: hidden;
  }
  .detail-item::before {
    content: attr(data-num);
    position: absolute; top: -2rem; right: -1rem;
    font-family: 'Fraunces', serif;
    font-size: 12rem; font-weight: 900;
    color: var(--accent); opacity: 0.08; line-height: 1;
  }
  .detail-item:nth-child(even) .detail-img-wrap { order: 2; }
  .detail-img-wrap { position: relative; }
  .detail-img {
    width: 100%; aspect-ratio: 4 / 3;
    object-fit: cover; border-radius: 1.5rem;
    box-shadow: 0 15px 40px rgba(26, 20, 16, 0.15);
  }
  .detail-flag-big {
    position: absolute; bottom: -1rem; left: -1rem;
    width: 80px; height: 80px;
    border-radius: 50%; object-fit: cover;
    border: 5px solid var(--paper);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  .detail-content { position: relative; z-index: 1; }
  .detail-city {
    font-family: 'Fraunces', serif; font-weight: 900;
    font-size: clamp(1.8rem, 3.5vw, 2.5rem);
    letter-spacing: -0.02em; line-height: 1;
    margin-bottom: 0.3rem;
  }
  .detail-city-btn {
    background: none; border: none; padding: 0;
    cursor: pointer; color: inherit;
    text-align: left;
    display: inline-flex; align-items: baseline; gap: 0.5rem;
    transition: color 0.25s, transform 0.25s;
  }
  .detail-city-btn:hover { color: var(--accent); transform: translateX(4px); }
  .album-icon {
    font-size: 0.4em;
    opacity: 0.4;
    transition: opacity 0.25s, transform 0.25s;
  }
  .detail-city-btn:hover .album-icon { opacity: 1; transform: rotate(-8deg) scale(1.15); }

  /* Album modal */
  .album-modal {
    position: fixed; inset: 0;
    background: rgba(10, 10, 10, 0.92);
    backdrop-filter: blur(10px);
    z-index: 1000;
    display: none;
    overflow: hidden;
  }
  .album-modal.active {
    display: block;
    animation: albumFadeIn 0.3s ease;
  }
  @keyframes albumFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .album-container {
    position: relative;
    width: 100%; height: 100%;
  }
  .album-photo {
    position: absolute;
    border-radius: 10px;
    box-shadow: 0 15px 45px rgba(0,0,0,0.5);
    opacity: 0;
    object-fit: cover;
    will-change: transform, opacity;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  .album-photo[data-landed="1"] {
    pointer-events: auto;
    cursor: grab;
  }
  .album-photo[data-landed="1"].dragging {
    cursor: grabbing;
    box-shadow: 0 25px 65px rgba(0,0,0,0.75);
  }
  .album-photo.fall {
    animation: photoFall 1.8s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
  }
  @keyframes photoFall {
    0% {
      transform: translateY(-120vh) rotate(0deg) scale(0.85);
      opacity: 0;
    }
    15% { opacity: 1; }
    100% {
      transform: translateY(var(--end-y, 0px)) rotate(var(--end-rot, 0deg)) scale(1);
      opacity: 1;
    }
  }
  .album-title {
    position: fixed;
    top: 1.5rem; left: 1.8rem;
    color: white;
    font-family: 'Fraunces', serif;
    font-size: 1.6rem; font-weight: 700;
    letter-spacing: -0.02em;
    z-index: 1001;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .album-hint {
    position: fixed;
    bottom: 1.2rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    z-index: 1001;
  }
  .album-close {
    position: fixed;
    top: 1.2rem; right: 1.2rem;
    background: white; color: var(--ink);
    border: none;
    width: 48px; height: 48px;
    border-radius: 50%;
    font-size: 1.6rem; font-weight: 700;
    cursor: pointer;
    z-index: 1001;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    transition: transform 0.2s;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    padding: 0 0 0.1em;
  }
  .album-close:hover { transform: scale(1.12) rotate(90deg); }

  /* ============================================================
     Stacking city cards
  ============================================================ */
  .city-stack {
    padding: 0 0 14vh;
    max-width: 900px;
    margin: 0 auto;
  }
  .city-card {
    position: sticky;
    top: calc(90px + var(--i, 0) * 10px);
    height: min(60vh, 520px);
    border-radius: 28px;
    padding: clamp(22px, 3vw, 38px);
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: clamp(16px, 2.5vw, 32px);
    overflow: hidden;
    box-shadow: 0 -10px 40px rgba(26, 20, 16, 0.15);
    color: #fff;
    transform-origin: center top;
    scroll-margin-top: 80px;
  }
  .city-card:last-child { margin-bottom: 0; }

  .city-card-text {
    display: flex; flex-direction: column; height: 100%;
    min-width: 0;
  }
  .city-card-header {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1.2rem;
  }
  .city-card-flag {
    width: 40px; height: 40px;

  .city-card-country {

  .city-card-num {

  }
  .city-card-name {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(1.9rem, 4vw, 3rem);

  .city-card-name.btn {
    background: none; border: none; padding: 0; cursor: pointer;
    text-align: left;
    display: inline-flex; align-items: baseline; gap: 0.55rem;
    transition: opacity 0.25s, transform 0.25s;

  .city-card-name.btn:hover { opacity: 0.88; transform: translateX(4px); }
  .city-card-name .album-icon {

  .city-card-rows {

  /* 6色をローテーション */
  .city-card.col-0 { background: linear-gradient(135deg, #c43a1f 0%, #ff6a3c 100%); }
  .city-card.col-1 { background: linear-gradient(135deg, #1a4d6e 0%, #0e7c91 100%); }

  @media (max-width: 780px) {

  .detail-row {

  .detail-row:last-child { border-bottom: none; }

  }
  .detail-value { font-size: 0.95rem; font-weight: 600; }
  .detail-memo {
    margin-top: 1.5rem; padding: 1rem;

  }
  .footer {
    text-align: center; padding: 4rem 2rem;
    font-family: 'Sacramento', 'Caveat', cursive;
    font-size: 3.5rem;

  @media (max-width: 768px) {
    .nav { padding: 1rem 1.2rem; flex-wrap: wrap; gap: 0.5rem; }
    .nav-logo { font-size: 1.4rem; }
    .nav-stats { gap: 0.9rem; font-size: 0.65rem; }

      grid-template-columns: 1fr !important;

    }
    .detail-item:nth-child(even) .detail-img-wrap { order: 0; }
    .card { width: 240px; height: 360px; }
  }
</style>
</head>
<body>

<div class="album-modal" id="albumModal" onclick="if(event.target===this) closeAlbum()">
  <div class="album-title" id="albumTitle"></div>
  <button class="album-close" onclick="closeAlbum()" aria-label="閉じる">×</button>
  <div class="album-container" id="albumContainer"></div>
  <div class="album-hint">click outside to close · press Esc</div>
</div>

<script>
  // ===== 統計計算 =====
  const allCities = TRIPS.flatMap(t => t.cities);
  const totalCountries = TRIPS.length;
  const totalCities = allCities.length;
  const totalDays = allCities.reduce((sum, c) => {
    const m = c.days.match(/\d+/);
    return sum + (m ? parseInt(m[0]) : 0);
  }, 0);
  // 飛行距離 = 各都市の距離 × 2 (往復), マイル換算
  const totalDistanceKm = allCities.reduce((sum, c) => sum + (c.distance || 0), 0) * 2;
  const totalDistanceMi = Math.round(totalDistanceKm * 0.621371);
  const distanceFmt = totalDistanceMi.toLocaleString();

  document.getElementById('navStats').innerHTML =
    '<span><b>' + totalCountries + '</b> 国</span>' +
    '<span><b>' + totalCities + '</b> 都市</span>' +
    '<span><b>' + totalDays + '</b> days</span>' +
    '<span><b>' + distanceFmt + '</b> mi</span>';

  // ===== 拠点 =====
  document.getElementById('homeBadgeFlag').src = 'https://flagcdn.com/w160/' + HOME.flag + '.png';
  document.getElementById('homeBadgeName').textContent = HOME.base;
  document.getElementById('homeFlag').src = 'https://flagcdn.com/w320/' + HOME.flag + '.png';
  document.getElementById('homeName').textContent = HOME.nameEn;
  document.getElementById('homeEn').textContent = HOME.base;
  document.getElementById('homeMemo').textContent = '"' + HOME.memo + '"';

  // ===== FV国旗ストリップ =====
  // 表示専用の追加フラグ（カード側には反映しない）
  const EXTRA_FLAGS_AFTER = {
    italy:   [{ flag: 'va', label: 'Vatican City' }],
    austria: [{ flag: 'de', label: 'Germany' }]
  };
  const flagStrip = document.getElementById('flagStrip');
  const flagList = [];
  TRIPS.forEach(trip => {
    flagList.push({ flag: trip.flag, label: trip.nameEn, targetId: trip.cities[0].id });
    (EXTRA_FLAGS_AFTER[trip.id] || []).forEach(extra => {
      flagList.push({ flag: extra.flag, label: extra.label, targetId: null });
    });
  });
  flagList.forEach((item, i) => {
    const img = document.createElement('img');
    img.className = 'flag-chip';
    img.src = 'https://flagcdn.com/w160/' + item.flag + '.png';
    img.alt = item.label;
    img.title = item.label;
    img.style.animationDelay = (i * 0.08) + 's';
    if (item.targetId) {
      img.onclick = () => document.getElementById(item.targetId).scrollIntoView({behavior:'smooth'});
    }
    flagStrip.appendChild(img);
  });

  // ===== スライダー (都市カード) =====
  const slider = document.getElementById('slider');
  let cityIdx = 0;
  const cardData = [];
  TRIPS.forEach(trip => {
    trip.cities.forEach(city => {
      cityIdx++;
      cardData.push({ trip, city, idx: cityIdx });
    });
  });

  const makeCard = (d) =>
    '<button class="card" onclick="document.getElementById(\'' + d.city.id + '\').scrollIntoView({behavior:\'smooth\'})">' +
      '<span class="card-number">' + String(d.idx).padStart(2, '0') + '</span>' +
      '<img class="card-photo" src="' + d.city.photo + '" alt="' + d.city.nameEn + '" loading="lazy">' +
      '<img class="card-flag" src="https://flagcdn.com/w160/' + d.trip.flag + '.png" alt="' + d.trip.flag + '">' +
      '<div class="card-info">' +
        '<div class="card-country-label">' + d.trip.nameEn + '</div>' +
        '<div class="card-city">' + d.city.nameEn + '</div>' +
        '<div class="card-meta">' + d.city.period.split('–')[0].trim() + ' · ' + d.city.days + '</div>' +
      '</div>' +
    '</button>';

  slider.innerHTML = cardData.map(makeCard).join('') + cardData.map(makeCard).join('');

  // ===== スライダー自動スクロール + 手動操作 =====
  let pausedUntil = 0;

  function autoScrollTick() {
    if (Date.now() > pausedUntil) {
      slider.scrollLeft += 0.6;
      const half = slider.scrollWidth / 2;
      if (slider.scrollLeft >= half) {
        slider.scrollLeft -= half;
      }
    }
    requestAnimationFrame(autoScrollTick);
  }
  requestAnimationFrame(autoScrollTick);

  slider.addEventListener('mouseenter', () => { pausedUntil = Infinity; });
  slider.addEventListener('mouseleave', () => { pausedUntil = Date.now() + 1200; });
  ['wheel', 'touchstart', 'pointerdown'].forEach(ev =>
    slider.addEventListener(ev, () => { pausedUntil = Date.now() + 2500; }, { passive: true })
  );

  const stepWidth = () => {
    const card = slider.querySelector('.card');
    return card ? card.offsetWidth + 24 : 300;
  };

  document.getElementById('sliderPrev').addEventListener('click', () => {
    pausedUntil = Date.now() + 3000;
    let target = slider.scrollLeft - stepWidth();
    if (target < 0) target += slider.scrollWidth / 2;
    slider.scrollTo({ left: target, behavior: 'smooth' });
  });
  document.getElementById('sliderNext').addEventListener('click', () => {
    pausedUntil = Date.now() + 3000;
    slider.scrollBy({ left: stepWidth(), behavior: 'smooth' });
  });

  // ===== 詳細リスト: 都市カードをスタッキング表示 =====
  let cityIdxStack = 0;
  const allCityCardsHtml = TRIPS.flatMap(trip =>
    trip.cities.map(city => {
      cityIdxStack++;
      const num = String(cityIdxStack).padStart(2, '0');
      const i = cityIdxStack - 1;
      const colorClass = 'col-' + (i % 6);
      const nameEl = city.album
        ? '<button class="city-card-name btn" onclick="openAlbum(\'' + city.id + '\')">' + city.nameEn + '<span class="album-icon">📷</span></button>'
        : '<h3 class="city-card-name">' + city.nameEn + '</h3>';
      return (
        '<article class="city-card ' + colorClass + '" id="' + city.id + '" style="--i:' + i + '">' +
          '<div class="city-card-text">' +
            '<div class="city-card-header">' +
              '<img class="city-card-flag" src="https://flagcdn.com/w160/' + trip.flag + '.png" alt="' + trip.flag + '">' +
              '<span class="city-card-country">' + trip.nameEn + ' · ' + trip.period + '</span>' +
              '<span class="city-card-num">(' + num + ')</span>' +
            '</div>' +
            nameEl +
            '<div class="city-card-rows">' +
              '<div class="city-card-row"><span class="city-card-label">Period</span><span class="city-card-value">' + city.period + '</span></div>' +
              '<div class="city-card-row"><span class="city-card-label">Duration</span><span class="city-card-value">' + city.days + '</span></div>' +
              '<div class="city-card-row"><span class="city-card-label">Distance</span><span class="city-card-value">' + Math.round(city.distance * 0.621371).toLocaleString() + ' mi</span></div>' +
              '<div class="city-card-row"><span class="city-card-label">Attractions</span><span class="city-card-value">' + city.attractions + '</span></div>' +
            '</div>' +
          '</div>' +
          '<div class="city-card-photo-wrap">' +
            '<img class="city-card-photo" src="' + city.photo + '" alt="' + city.nameEn + '" loading="lazy">' +
          '</div>' +
        '</article>'
      );
    })
  ).join('');

  document.getElementById('detailsList').innerHTML = '<div class="city-stack">' + allCityCardsHtml + '</div>';

  // ===== アルバムモーダル =====
  const cityAlbums = {};
  const cityNames = {};
  TRIPS.forEach(t => t.cities.forEach(c => {
    if (c.album) { cityAlbums[c.id] = c.album.filter(s => !/\.(mp4|mov|webm|m4v)$/i.test(s)); cityNames[c.id] = c.nameEn; }
  }));

  window.openAlbum = function(cityId) {
    const album = cityAlbums[cityId];
    if (!album) return;
    const modal = document.getElementById('albumModal');
    const container = document.getElementById('albumContainer');
    const titleEl = document.getElementById('albumTitle');
    container.innerHTML = '';
    titleEl.textContent = cityNames[cityId] + ' — Album';

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const aspects = [[4,3],[3,4],[1,1],[3,2],[2,3]];
    album.forEach((src, i) => {
      const isVideo = /\.(mp4|mov|webm|m4v)$/i.test(src);
      const img = document.createElement(isVideo ? 'video' : 'img');
      img.className = 'album-photo';
      if (isVideo) {
        img.muted = true;
        img.loop = true;
        img.autoplay = true;
        img.playsInline = true;
        img.setAttribute('muted', '');
        img.setAttribute('loop', '');
        img.setAttribute('autoplay', '');
        img.setAttribute('playsinline', '');
      }
      img.src = src;
      const [aw, ah] = aspects[Math.floor(Math.random() * aspects.length)];
      const w = 180 + Math.random() * 140;
      const h = w * ah / aw;
      img.style.width = w + 'px';
      img.style.height = h + 'px';
      const startX = Math.random() * Math.max(20, vw - w - 20);
      img.style.left = startX + 'px';
      img.style.top = '0px';
      const endY = 70 + Math.random() * Math.max(100, vh - h - 160);
      const endRot = (Math.random() - 0.5) * 28;
      img.style.setProperty('--end-y', endY + 'px');
      img.style.setProperty('--end-rot', endRot + 'deg');
      img.dataset.endY = endY;
      img.dataset.endRot = endRot;
      img.dataset.dx = '0';
      img.dataset.dy = '0';
      img.style.animationDelay = (i * 0.18) + 's';
      container.appendChild(img);
      img.addEventListener('animationend', () => {
        const eY = parseFloat(img.dataset.endY);
        const eR = parseFloat(img.dataset.endRot);
        // インラインに最終状態を焼き付けてからアニメーションを外す（以降はインラインが制御）
        img.style.transform = 'translateY(' + eY + 'px) rotate(' + eR + 'deg) scale(1)';
        img.style.opacity = '1';
        img.classList.remove('fall');
        img.dataset.landed = '1';
      }, { once: true });
      requestAnimationFrame(() => img.classList.add('fall'));
    });

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  };

  // ドラッグで写真を動かす
  let dragPhoto = null;
  let dragOff = null;
  let topZ = 10;
  (function initAlbumDrag() {
    const container = document.getElementById('albumContainer');
    const start = (cx, cy, photo) => {
      if (!photo || photo.dataset.landed !== '1') return false;
      dragPhoto = photo;
      const dx = parseFloat(photo.dataset.dx || '0');
      const dy = parseFloat(photo.dataset.dy || '0');
      const endY = parseFloat(photo.dataset.endY || '0');
      const endRot = parseFloat(photo.dataset.endRot || '0');
      dragOff = { mx: cx, my: cy, dx, dy, endY, endRot };
      photo.style.zIndex = ++topZ;
      photo.classList.add('dragging');
      // Lock inline transform to current visual state (= animation's final keyframe)
      photo.style.transform = 'translate(' + dx + 'px, ' + (endY + dy) + 'px) rotate(' + endRot + 'deg) scale(1)';
      return true;
    };
    const move = (cx, cy) => {
      if (!dragPhoto || !dragOff) return;
      const ndx = dragOff.dx + (cx - dragOff.mx);
      const ndy = dragOff.dy + (cy - dragOff.my);
      dragPhoto.dataset.dx = ndx;
      dragPhoto.dataset.dy = ndy;
      dragPhoto.style.transform = 'translate(' + ndx + 'px, ' + (dragOff.endY + ndy) + 'px) rotate(' + dragOff.endRot + 'deg) scale(1)';
    };
    const end = () => {
      if (dragPhoto) dragPhoto.classList.remove('dragging');
      dragPhoto = null; dragOff = null;
    };
    container.addEventListener('mousedown', (e) => {
      const photo = e.target.closest('.album-photo');
      if (start(e.clientX, e.clientY, photo)) e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));
    document.addEventListener('mouseup', end);
    container.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      const photo = e.target.closest('.album-photo');
      if (start(t.clientX, t.clientY, photo)) e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchmove', (e) => {
      if (dragPhoto) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }
    }, { passive: false });
    document.addEventListener('touchend', end);
  })();

  window.closeAlbum = function() {
    document.getElementById('albumModal').classList.remove('active');
    document.body.style.overflow = '';
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeAlbum();
  });

  // FVを抜けたらサイドタブを表示
  const sideTabsEl = document.querySelector('.side-tabs');
  const fvEl = document.querySelector('.fv');
  if (sideTabsEl && fvEl) {
    new IntersectionObserver((entries) => {
      entries.forEach(e => {
        sideTabsEl.classList.toggle('visible', !e.isIntersecting);
      });
    }, { threshold: 0.15 }).observe(fvEl);
  }

  // ===== マーキー（流れる写真帯）=====
  const tiles = [];
  TRIPS.forEach(trip => trip.cities.forEach(city => {
    tiles.push({
      photo: city.marqueePhoto || city.photo,
      flag: trip.flag,
      caption: city.nameEn + ', ' + trip.nameEn
    });
  }));
  const renderTile = t =>
    '<div class="m-stack">' +
      '<div class="m-back" style="background-image:url(\'' + t.photo + '\')"></div>' +
      '<div class="m-front" style="background-image:url(\'' + t.photo + '\')">' +
        '<img class="m-flag" src="https://flagcdn.com/w80/' + t.flag + '.png" alt="">' +
        '<div class="m-caption">' + t.caption + '</div>' +
      '</div>' +
    '</div>';
  const tilesHtml = tiles.map(renderTile).join('');
  const trackEl = document.getElementById('marqueeTrack');
  if (trackEl) trackEl.innerHTML = tilesHtml + tilesHtml;

  // ===== Album wall (landing stack + infinite drag canvas) =====
  (function setupAlbumWall() {
    // 全アルバムから写真だけ集める（動画は除外）
    const AW_IMAGES = [];
    TRIPS.forEach(trip => trip.cities.forEach(city => {
      if (city.album) {
        city.album.forEach(src => {
          if (!/\.(mp4|mov|webm|m4v)$/i.test(src)) AW_IMAGES.push(src);
        });
      }
    }));
    // スタック用は marqueePhoto を最優先（人物無しの厳選ショット）
    const AW_STACK = [];
    TRIPS.forEach(trip => trip.cities.forEach(city => {
      if (city.marqueePhoto) AW_STACK.push(city.marqueePhoto);
    }));
    while (AW_STACK.length < 5 && AW_IMAGES.length) AW_STACK.push(AW_IMAGES[AW_STACK.length]);
    const STACK_IMGS = AW_STACK.slice(0, 5);

    const stackEl = document.getElementById('aw-stack');
    if (!stackEl) return;

    // スタック画像を傾けて積む
    const angles  = [-9, 6, -4, 8, 0];
    const offsets = [{x:-26,y:14},{x:22,y:-10},{x:-14,y:-18},{x:16,y:12},{x:0,y:0}];
    const stackPhotos = [];
    STACK_IMGS.forEach((src, i) => {
      const p = document.createElement('div');
      p.className = 'aw-photo';
      p.style.backgroundImage = 'url("' + src + '")';
      const a = angles[i] ?? 0;
      const o = offsets[i] ?? {x:0,y:0};
      p.dataset.angle = a; p.dataset.ox = o.x; p.dataset.oy = o.y;
      p.style.transform = 'translate(' + o.x + 'px,' + o.y + 'px) rotate(' + a + 'deg)';
      p.style.zIndex = i + 1;
      stackEl.insertBefore(p, stackEl.firstChild);
      stackPhotos.push(p);
    });
    stackEl.addEventListener('pointerenter', () => {
      stackPhotos.forEach(p => {
        const a = parseFloat(p.dataset.angle), ox = parseFloat(p.dataset.ox), oy = parseFloat(p.dataset.oy);
        p.style.transform = 'translate(' + (ox*1.5) + 'px,' + (oy*1.5) + 'px) rotate(' + (a*1.4) + 'deg) scale(1.02)';
      });
    });
    stackEl.addEventListener('pointerleave', () => {
      stackPhotos.forEach(p => {
        const a = parseFloat(p.dataset.angle), ox = parseFloat(p.dataset.ox), oy = parseFloat(p.dataset.oy);
        p.style.transform = 'translate(' + ox + 'px,' + oy + 'px) rotate(' + a + 'deg)';
      });
    });

    // 遷移
    const landing = document.getElementById('aw-landing');
    const album   = document.getElementById('aw-album');
    let entered = false;

    function goToAlbum() {
      if (entered) return;
      entered = true;
      stackPhotos.forEach(p => {
        const a = parseFloat(p.dataset.angle);
        p.style.transform = 'translate(0,0) rotate(' + a + 'deg) scale(1.25)';
        p.style.opacity = '0';
      });
      landing.classList.add('aw-leaving');
      setTimeout(() => { album.classList.add('aw-active'); startCanvas(); }, 450);
    }
    stackEl.addEventListener('click', goToAlbum);

    function resetToLanding() {
      entered = false;
      album.classList.remove('aw-active');
      landing.classList.remove('aw-leaving');
      stackPhotos.forEach(p => {
        const a = parseFloat(p.dataset.angle), ox = parseFloat(p.dataset.ox), oy = parseFloat(p.dataset.oy);
        p.style.opacity = '1';
        p.style.transform = 'translate(' + ox + 'px,' + oy + 'px) rotate(' + a + 'deg)';
      });
      // ドラッグ位置もリセット
      offset = { x: 0, y: 0 };
      velocity = { x: 0, y: 0 };
    }
    document.getElementById('aw-backBtn').addEventListener('click', resetToLanding);

    // セクションがビューポートから外れたら必ず初期画面にリセット
    const awStage = document.getElementById('aw-stage');
    new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (!e.isIntersecting && entered) resetToLanding();
      });
    }, { threshold: 0 }).observe(awStage);

    // 無限ドラッグキャンバス
    const CARD_W = 320, CARD_H = 420, GAP_X = 100, GAP_Y = 100;
    const CELL_W = CARD_W + GAP_X, CELL_H = CARD_H + GAP_Y;
    const ARROW_SVG = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

    const vp = document.getElementById('aw-viewport');
    let offset = {x:0, y:0}, velocity = {x:0, y:0}, dragging = false;
    let last = {x:0, y:0};
    let size = {w: window.innerWidth, h: window.innerHeight};
    let running = false;
    const pool = new Map();

    function cellInfo(col, row) {
      const len = AW_IMAGES.length;
      const idx = (((col * 3 + row * 7) % len) + len) % len;
      const yShift = ((Math.abs(col) % 2) * CELL_H) / 2;
      return { src: AW_IMAGES[idx], yShift };
    }

    function render() {
      if (!running) return;
      if (!dragging) {
        offset.x += velocity.x; offset.y += velocity.y;
        velocity.x *= 0.93; velocity.y *= 0.93;
        if (Math.abs(velocity.x) < 0.05) velocity.x = 0;
        if (Math.abs(velocity.y) < 0.05) velocity.y = 0;
      }
      const ox = offset.x, oy = offset.y;
      const sCol = Math.floor((-ox - CELL_W) / CELL_W);
      const eCol = Math.ceil((-ox + size.w + CELL_W) / CELL_W);
      const sRow = Math.floor((-oy - CELL_H) / CELL_H);
      const eRow = Math.ceil((-oy + size.h + CELL_H) / CELL_H);
      const need = new Set();
      for (let c = sCol; c <= eCol; c++) {
        for (let r = sRow; r <= eRow; r++) {
          const key = c + '_' + r;
          need.add(key);
          const { src, yShift } = cellInfo(c, r);
          const x = c * CELL_W + ox + GAP_X / 2;
          const y = r * CELL_H + oy + yShift + GAP_Y / 2;
          let el = pool.get(key);
          if (!el) {
            el = document.createElement('div');
            el.className = 'aw-card';
            el.style.width = CARD_W + 'px';
            el.style.height = CARD_H + 'px';
            el.innerHTML = '<img src="' + src + '" alt="" draggable="false">';
            vp.appendChild(el);
            pool.set(key, el);
          }
          el.style.transform = 'translate3d(' + x + 'px,' + y + 'px,0)';
        }
      }
      for (const [k, el] of pool) { if (!need.has(k)) { el.remove(); pool.delete(k); } }
      requestAnimationFrame(render);
    }

    function startCanvas() {
      if (running) return;
      running = true;
      // ビューポート計測（セクション基準）
      const rect = vp.getBoundingClientRect();
      size = { w: rect.width, h: rect.height };
      requestAnimationFrame(render);
    }

    vp.addEventListener('pointerdown', (e) => {
      dragging = true;
      vp.classList.add('aw-grabbing');
      last = { x: e.clientX, y: e.clientY };
      velocity = { x: 0, y: 0 };
      try { vp.setPointerCapture(e.pointerId); } catch (_) {}
    });
    vp.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - last.x, dy = e.clientY - last.y;
      offset.x += dx; offset.y += dy;
      velocity = { x: dx, y: dy };
      last = { x: e.clientX, y: e.clientY };
    });
    function endDrag(e) {
      dragging = false;
      vp.classList.remove('aw-grabbing');
      try { vp.releasePointerCapture(e.pointerId); } catch (_) {}
    }
    vp.addEventListener('pointerup', endDrag);
    vp.addEventListener('pointercancel', endDrag);
    vp.addEventListener('wheel', (e) => {
      // アルバム表示中のみキャプチャ
      if (!document.getElementById('aw-album').classList.contains('aw-active')) return;
      e.preventDefault();
      velocity = { x: 0, y: 0 };
      offset.x -= e.deltaX; offset.y -= e.deltaY;
    }, { passive: false });

    window.addEventListener('resize', () => {
      const r = vp.getBoundingClientRect();
      size = { w: r.width, h: r.height };
    });
  })();
</script>

</body>
</html>
